name: Release
run-name: "Release ${{ github.event_name == 'workflow_dispatch' && (inputs.version != '' && format('v{0}', inputs.version) || 'auto-patch') || github.ref_name }} (mode: ${{ github.event_name == 'workflow_dispatch' && inputs.mode || 'tag-push' }})"

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      mode:
        description: "What to do"
        type: choice
        required: true
        default: dry-run
        options:
          - dry-run
          - release
      version:
        description: "Version to release (without the leading 'v'), e.g. 1.2.3. Optional in mode=release: if omitted, the workflow auto-increments the latest vMAJOR.MINOR.PATCH tag."
        type: string
        required: false
      branch:
        description: "Branch that must contain the commit to release (default: main)."
        type: string
        required: false
        default: main

permissions:
  contents: write

env:
  GORELEASER_VERSION: "~> v2" # Keep in sync with .goreleaser.yml

jobs:
  goreleaser:
    name: Publish GitHub Release
    runs-on: [ubuntu-latest]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.branch || github.ref }}

      - name: Ensure workflow_dispatch runs from branch tip
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.mode == 'release' }}
        env:
          BRANCH: ${{ inputs.branch }}
        run: |
          git fetch origin "$BRANCH" --depth=1
          CURRENT_SHA="$(git rev-parse HEAD)"
          BRANCH_SHA="$(git rev-parse "origin/${BRANCH}")"
          if [ "$CURRENT_SHA" != "$BRANCH_SHA" ]; then
            echo "Refusing to run: checked out commit ($CURRENT_SHA) is not the tip of origin/${BRANCH} ($BRANCH_SHA)." >&2
            echo "Re-run the workflow from the ${BRANCH} branch tip (or adjust inputs.branch intentionally)." >&2
            exit 1
          fi

      - name: Configure git user (workflow_dispatch release)
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.mode == 'release' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Resolve release tag (workflow_dispatch release)
        id: resolve_release_tag
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.mode == 'release' }}
        env:
          VERSION: ${{ inputs.version }}
        run: |
          # Ensure we calculate from the latest remote tags.
          git fetch --force --tags origin

          if [ -z "$VERSION" ]; then
            LAST_TAG="$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -n1)"
            if [ -z "$LAST_TAG" ]; then
              TAG="v0.0.1"
              echo "No existing vMAJOR.MINOR.PATCH tags found; using initial tag $TAG"
            else
              IFS='.' read -r MAJOR MINOR PATCH <<< "${LAST_TAG#v}"
              TAG="v${MAJOR}.${MINOR}.$((PATCH + 1))"
              echo "inputs.version not provided; auto-incrementing patch: ${LAST_TAG} -> ${TAG}"
            fi
          else
            TAG="v${VERSION}"
          fi

          # Basic sanity check: vMAJOR.MINOR.PATCH
          if ! echo "$TAG" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Invalid version '$VERSION'. Expected MAJOR.MINOR.PATCH (example: 1.2.3)" >&2
            exit 1
          fi

          echo "Resolved release tag: $TAG"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Write release summary (workflow_dispatch release)
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.mode == 'release' }}
        env:
          TAG: ${{ steps.resolve_release_tag.outputs.tag }}
        run: |
          {
            echo "## Release summary"
            echo
            echo "- mode: \`release\`"
            echo "- source: \`workflow_dispatch\`"
            echo "- version/tag: \`${TAG}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Write release summary (push tag)
        if: ${{ github.event_name == 'push' }}
        run: |
          {
            echo "## Release summary"
            echo
            echo "- mode: \`tag-push\`"
            echo "- source: \`push\`"
            echo "- version/tag: \`${GITHUB_REF_NAME}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Create and push tag (workflow_dispatch release)
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.mode == 'release' }}
        env:
          TAG: ${{ steps.resolve_release_tag.outputs.tag }}
        run: |
          # Fail fast if tag already exists remotely
          if git ls-remote --exit-code --tags origin "$TAG" >/dev/null 2>&1; then
            echo "Tag '$TAG' already exists on origin. Aborting." >&2
            exit 1
          fi
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"
          # Make sure the local clone sees the new tag before running GoReleaser.
          git fetch --force --tags origin

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install syft (SBOM generator)
        uses: anchore/sbom-action/download-syft@v0

      - name: Generate SBOM (CycloneDX JSON)
        run: |
          mkdir -p dist
          syft dir:. -o cyclonedx-json=dist/sbom.cdx.json

      # For workflow_dispatch, default is a dry-run (does not publish).
      - name: Run GoReleaser (dry-run)
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.mode == 'dry-run' }}
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: ${{ env.GORELEASER_VERSION }}
          args: release --snapshot --clean

      # On tags, or if requested manually, publish the GitHub Release.
      - name: Run GoReleaser (publish)
        if: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.mode == 'release') }}
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: ${{ env.GORELEASER_VERSION }}
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Attach the SBOM as a release asset when publishing.
      - name: Upload SBOM to GitHub Release
        if: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.mode == 'release') }}
        uses: softprops/action-gh-release@v3
        with:
          files: dist/sbom.cdx.json
          tag_name: ${{ github.event_name == 'workflow_dispatch' && steps.resolve_release_tag.outputs.tag || github.ref_name }}
